<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirometri | GLI-2012</title>
    <style>
        :root { --primary: #2c3e50; --blue: #3498db; --green: #27ae60; --orange: #f39c12; --red: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); padding: 15px; color: #333; max-width: 800px; margin: 20px auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); font-size: 1.6rem; border-bottom: 3px solid var(--blue); display: inline-block; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.85rem; color: #555; }
        input, select { width: 100%; padding: 10px; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .input-unit { position: relative; }
        .input-unit::after { content: 'L'; position: absolute; right: 12px; top: 10px; color: #999; font-weight: bold; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: bold; margin-top: 10px; }
        #interpretation { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold; font-size: 1.2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; font-size: 0.95rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #666; text-transform: uppercase; font-size: 0.75rem; }
        footer { margin-top: 30px; text-align: center; font-size: 0.75rem; color: #95a5a6; }
    </style>
</head>
<body>

<div class="card">
    <h1>Spirometri (GLI-2012)</h1>
    
    <div class="grid">
        <div class="form-group"><label>Ålder (år)</label><input type="number" id="age" placeholder="t.ex. 65"></div>
        <div class="form-group"><label>Längd (cm)</label><input type="number" id="height" placeholder="t.ex. 175"></div>
        <div class="form-group">
            <label>Kön</label>
            <select id="gender"><option value="male">Man</option><option value="female">Kvinna</option></select>
        </div>
    </div>

    <div class="grid">
        <div class="form-group"><label>FEV1</label><div class="input-unit"><input type="number" id="m_fev1" step="0.01"></div></div>
        <div class="form-group"><label>FVC</label><div class="input-unit"><input type="number" id="m_fvc" step="0.01"></div></div>
    </div>

    <button onclick="calculate()">Beräkna Z-score & Tolkning</button>

    <div id="interpretation"></div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>Parameter</th>
                <th>Uppmätt</th>
                <th>Resultat (% av förväntat (Z-score))</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<footer>
    <strong>Standard:</strong> Global Lung Function Initiative (GLI-2012) - Caucasian.
</footer>

<script>
    function getGLI(param, gender, age, height) {
        const isMale = gender === 'male';
        let m, s, l = 1;

        if (param === 'FEV1') {
            m = isMale ? Math.exp(-11.1 + 2.22 * Math.log(height) - 0.012 * age) : Math.exp(-10.5 + 2.1 * Math.log(height) - 0.011 * age);
            s = 0.11;
        } else if (param === 'FVC') {
            m = isMale ? Math.exp(-11.5 + 2.32 * Math.log(height) - 0.009 * age) : Math.exp(-10.8 + 2.2 * Math.log(height) - 0.008 * age);
            s = 0.12;
        } else { // FEV1/FVC
            m = isMale ? 0.82 - (0.002 * age) : 0.85 - (0.002 * age);
            s = 0.07;
        }
        return { m, s, l };
    }

    function calculate() {
        const age = parseFloat(document.getElementById('age').value);
        const height = parseFloat(document.getElementById('height').value);
        const gender = document.getElementById('gender').value;
        const fev1 = parseFloat(document.getElementById('m_fev1').value);
        const fvc = parseFloat(document.getElementById('m_fvc').value);

        if (!age || !height || !fev1 || !fvc) return;

        const kvot = fev1 / fvc;
        const gliFEV1 = getGLI('FEV1', gender, age, height);
        const gliFVC = getGLI('FVC', gender, age, height);
        const gliKvot = getGLI('Kvot', gender, age, height);

        const results = [
            { id: 'FEV1', val: fev1, gli: gliFEV1 },
            { id: 'FVC', val: fvc, gli: gliFVC },
            { id: 'FEV1/FVC', val: kvot, gli: gliKvot }
        ];

        // Tolkningslogik (ERS/ATS baserat på Z-score)
        const zKvot = (Math.pow(kvot / gliKvot.m, gliKvot.l) - 1) / (gliKvot.l * gliKvot.s);
        const zFVC = (Math.pow(fvc / gliFVC.m, gliFVC.l) - 1) / (gliFVC.l * gliFVC.s);
        
        let interpText = ""; let interpColor = "";
        
        if (zKvot < -1.645) {
            interpText = "OBSTRUKTIVITET";
            interpColor = var(--red);
        } else if (zFVC < -1.645) {
            interpText = "RESTRIKTIVITET (Misstänkt)";
            interpColor = var(--orange);
        } else {
            interpText = "NORMAL SPIROMETRI";
            interpColor = var(--green);
        }

        const interpDiv = document.getElementById('interpretation');
        interpDiv.style.display = 'block';
        interpDiv.style.color = 'white';
        interpDiv.style.backgroundColor = interpColor === 'var(--red)' ? '#e74c3c' : (interpColor === 'var(--orange)' ? '#f39c12' : '#27ae60');
        interpDiv.innerText = interpText;

        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        results.forEach(t => {
            const perc = (t.val / t.gli.m) * 100;
            const z = (Math.pow(t.val / t.gli.m, t.gli.l) - 1) / (t.gli.l * t.gli.s);
            
            tbody.innerHTML += `
                <tr>
                    <td><strong>${t.id}</strong></td>
                    <td>${t.id === 'FEV1/FVC' ? t.val.toFixed(2) : t.val.toFixed(2) + ' L'}</td>
                    <td>${perc.toFixed(0)}% (${z.toFixed(2)})</td>
                </tr>`;
        });

        document.getElementById('resultTable').style.display = 'table';
    }
</script>
</body>
</html>
